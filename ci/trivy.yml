# =============================================================================
# GitLab CI/CD — Java (Maven) build + Trivy security scanning
#
# Stages:
#   build       -> mvn package (so Trivy sees the full resolved dependency tree)
#   scan        -> Trivy: vuln + secret + misconfig  (FAILS on HIGH/CRITICAL)
#                  Trivy: license                     (report-only, never fails)
#   image       -> build Docker image (dind)
#   image-scan  -> Trivy image scan                   (FAILS on HIGH/CRITICAL)
#
# Free & self-hostable. Works on GitLab CE (self-managed).
# =============================================================================

# -----------------------------------------------------------------------------
# Hidden base job for all Trivy scans
# -----------------------------------------------------------------------------
.trivy:
  image:
    name: "aquasec/trivy:${TRIVY_VERSION}"
    entrypoint: [""]
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: "$CI_PROJECT_DIR/.trivycache"
    # Severities that BLOCK the pipeline:
    TRIVY_SEVERITY: "HIGH,CRITICAL"
    TRIVY_QUIET: "true"
  cache:
    key: trivy-db
    paths:
      - .trivycache
    policy: pull
  # NOTE: allow_failure does NOT support variable expansion at job level.
  # rules:allow_failure is the supported way to make it toggleable via $ALLOW_TRIVY_FAILURE.
  rules:
    - if: '$ALLOW_TRIVY_FAILURE == "true"'
      when: on_success
      allow_failure: true
    - when: on_success
      allow_failure: false

scan:build:
  stage: "Scan Phase 1"
  image: "$SG_BUILD_IMAGE"
  script:
    - mvn -Drevision=trivy -Delasticsearch.version=$ES_VERSION $MAVEN_CLI_OPTS package
    # Generate a CycloneDX SBOM with FULLY RESOLVED versions straight from the
    # build's local .m2 cache. Trivy scans this offline -> no remote Maven
    # lookups, so no more 429 rate-limit / IP blocks.
    - mvn -Drevision=trivy -Delasticsearch.version=$ES_VERSION $MAVEN_CLI_OPTS org.cyclonedx:cyclonedx-maven-plugin:${CYCLONEDX_VERSION}:makeAggregateBom -DoutputFormat=json -DoutputName=bom
    # Locate the aggregate SBOM (path varies on multi-module layouts) and copy
    # it to a fixed root path so the scan jobs always find it. Fails loudly if
    # no SBOM was produced.
    - 'if [ -f target/bom.json ]; then BOM=target/bom.json; else BOM=$(find . -name bom.json | head -n1); fi; echo "Using SBOM $BOM"; test -n "$BOM"; cp "$BOM" bom.json'
    - ls -la bom.json
  artifacts:
    paths:
      # One aggregate SBOM covering every module; a few hundred KB.
      - bom.json
      - plugin/target/releases/search-guard-flx-elasticsearch-plugin-trivy.zip
    expire_in: 1 hour
  variables:
    # --- Maven ---
    MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
    MAVEN_CLI_OPTS: "--batch-mode --errors --show-version -DskipTests"
    CYCLONEDX_VERSION: "2.9.2"   # bump as needed
  cache:
    key: "mavenrepo-$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository
    policy: pull

# -----------------------------------------------------------------------------
# 2a) Dependency vulns + secrets + IaC/Dockerfile misconfig  (BLOCKING)
# -----------------------------------------------------------------------------
scan:vuln:
  extends: .trivy
  stage: "Scan Phase 1"
  needs: ["scan:build"]
  script:
    - 'test -s bom.json || { echo "ERROR: bom.json is missing/empty - check the build job"; exit 1; }'
    # Scan ONCE (this is the only step that needs the DB); all reports are derived
    # from this JSON via `trivy convert` (no re-scan, no DB access).
    # NOTE: --ignore-unfixed must be applied HERE at scan time -- `trivy convert`
    # does not support that flag (it only supports --severity / --exit-code).
    - trivy sbom bom.json --ignore-unfixed --format json --output trivy-vuln.json
    # GitLab-native dependency-scanning report (MR Security widget; Ultimate only).
    - trivy convert --format template --template "@/contrib/gitlab.tpl" --output gl-dependency-scanning-report.json trivy-vuln.json
    # JUnit report so each finding shows in the pipeline "Tests" tab (all tiers, incl. CE). Non-failing.
    - trivy convert --severity $TRIVY_SEVERITY --format template --template "@/contrib/junit.tpl" --output junit-trivy-vuln.xml trivy-vuln.json
    # Enforcement pass: fails the pipeline on HIGH/CRITICAL
    - trivy convert --severity $TRIVY_SEVERITY --exit-code 1 --format table trivy-vuln.json
  cache:
    key: trivy-db
    paths:
      - .trivycache
    policy: pull-push        # the one producer that refreshes the DB
  artifacts:
    when: always
    reports:
      dependency_scanning: gl-dependency-scanning-report.json
      junit: junit-trivy-vuln.xml
    paths:
      - gl-dependency-scanning-report.json
      - junit-trivy-vuln.xml

scan:code:
  extends: .trivy
  stage: "Scan Phase 1"
  needs: []          # runs immediately, in parallel with build
  script:
    # --offline-scan stops the Java analyzer from resolving versions against
    # Maven Central (that remote lookup is what triggers the 429 here).
    # Scan ONCE to JSON, then derive reports via `trivy convert` (no re-scan).
    - trivy fs --scanners secret,misconfig --offline-scan --format json --output trivy-code.json .
    # JUnit report so each finding shows in the pipeline "Tests" tab. Non-failing.
    # (--ignore-unfixed omitted: not meaningful for secret/misconfig, and unsupported by `trivy convert`.)
    - trivy convert --severity $TRIVY_SEVERITY --format template --template "@/contrib/junit.tpl" --output junit-trivy-code.xml trivy-code.json
    # Enforcement pass: fails the pipeline on HIGH/CRITICAL
    - trivy convert --severity $TRIVY_SEVERITY --exit-code 1 --format table trivy-code.json
  artifacts:
    when: always
    reports:
      junit: junit-trivy-code.xml
    paths:
      - junit-trivy-code.xml
  cache: {} #no cache required

