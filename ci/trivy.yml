# -----------------------------------------------------------------------------
# 5b) Publish the HTML report to a server via SFTP, and (re)build a simple
#     index.html linking every report present in the remote directory.
#
#     Required CI/CD variables:
#       TRIVY_WEB_SFTP_HOST         target IP / hostname
#       TRIVY_WEB_SFTP_USER         ssh user
#       TRIVY_WEB_SFTP_SSH_PRIVATE_KEY   *File*-type variable holding the private key
#     Optional (defaults below):
#       TRIVY_WEB_SFTP_PORT         default 22
#       TRIVY_WEB_SFTP_REMOTE_DIR   default /data/upload (must be the web root served)
# -----------------------------------------------------------------------------
publish:sftp:
  stage: "Security Scan Phase 1"
  image: alpine:latest
  needs: ["report:html"]
  variables:
    TRIVY_WEB_SFTP_PORT: "22"
    TRIVY_WEB_SFTP_REMOTE_DIR: "/data/upload"
  rules:
    - if: '$TRIVY_WEB_SFTP_HOST && $TRIVY_WEB_SFTP_SSH_PRIVATE_KEY'
    #- if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $TRIVY_WEB_SFTP_HOST && $TRIVY_WEB_SFTP_SSH_PRIVATE_KEY'
      when: on_success
  script:
    - apk add --no-cache openssh-client
    - 'test -f "public/${CI_PROJECT_NAME}.html" || { echo "No report to publish."; exit 0; }'
    - 'mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"'
    - 'cp "$TRIVY_WEB_SFTP_SSH_PRIVATE_KEY" "$HOME/.ssh/id_deploy" && chmod 600 "$HOME/.ssh/id_deploy"'
    # The remote name carries a UTC timestamp plus the branch/tag (CI_COMMIT_REF_SLUG)
    # so successive runs never overwrite each other:
    #   yyyy_mm_dd_HH_mm_ss_<repo>_<branch-or-tag>.html
    - 'REMOTE_NAME="$(date -u +%Y_%m_%d_%H_%M_%S)_${CI_PROJECT_NAME}_${CI_COMMIT_REF_SLUG}.html"'
    - 'echo "Remote report name -> $REMOTE_NAME"'
    # The server allows the SFTP subsystem only (no exec channel), so scp and
    # `ssh <cmd>` are rejected. Drive everything through the sftp client via a
    # batch file. `-mkdir` is prefixed with `-` so a pre-existing dir is not a
    # fatal error (sftp mkdir is single-level; the parent must already exist).
    # accept-new = trust on first use. For stronger security, provide a
    # known_hosts File variable and copy it to $HOME/.ssh/known_hosts instead.
    - 'printf "%s\n" "-mkdir ${TRIVY_WEB_SFTP_REMOTE_DIR}" "put public/${CI_PROJECT_NAME}.html ${TRIVY_WEB_SFTP_REMOTE_DIR}/${REMOTE_NAME}" "bye" > sftp_batch.txt'
    - 'cat sftp_batch.txt'
    - 'sftp -i "$HOME/.ssh/id_deploy" -o StrictHostKeyChecking=accept-new -o "Port=${TRIVY_WEB_SFTP_PORT}" -b sftp_batch.txt "${TRIVY_WEB_SFTP_USER}@${TRIVY_WEB_SFTP_HOST}"'

# -----------------------------------------------------------------------------
# 6) GATE: fail the pipeline if any scan recorded a non-zero enforcement code.
#    Runs after Phase 1 so report/publish already happened. Toggle blocking via
#    $ALLOW_TRIVY_FAILURE.
# -----------------------------------------------------------------------------
verify:security:
  stage: "Security Scan Phase 2"
  image: busybox
  needs: ["scan:vuln", "scan:code", "build-and-scan:image"]
  script:
    - |
      # BLOCKING checks: dependency + code scans gate the pipeline.
      RC=0
      for f in exit_code_vuln.txt exit_code_code.txt; do
        code=$(cat "$f" 2>/dev/null || echo MISSING)
        echo "$f -> $code"
        [ "$code" = "0" ] || RC=1
      done

      # NON-BLOCKING check: image scan is report-only. A non-zero result is
      # surfaced prominently but never fails the job (base-image CVEs are often
      # outside this repo's control).
      image_code=$(cat exit_code_image.txt 2>/dev/null || echo MISSING)
      echo "exit_code_image.txt -> $image_code"
      if [ "$image_code" != "0" ]; then
        echo "############################################################"
        echo "## WARNING: image scan reported HIGH/CRITICAL findings     ##"
        echo "## (exit_code_image.txt=$image_code) - NOT failing the job ##"
        echo "## Review the Trivy image report / Tests tab.              ##"
        echo "############################################################"
      fi

      if [ "$RC" -ne 0 ]; then
        echo "Security gate FAILED (HIGH/CRITICAL findings present in deps/code)"
      else
        echo "Security gate passed"
      fi
      exit $RC
  # NOTE: allow_failure does NOT support variable expansion at job level.
  # rules:allow_failure is the supported way to make it toggleable via $ALLOW_TRIVY_FAILURE.
  rules:
    - if: '$ALLOW_TRIVY_FAILURE == "true"'
      when: on_success
      allow_failure: true
    - when: on_success
      allow_failure: false
