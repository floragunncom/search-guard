## -----------------------------------------------------------------------------
## 3) Build the image AND scan it in ONE job.
##    The image tarball stays local to the job workspace and is NEVER uploaded
##    as a CI artifact -> the artifact size limit does not apply.
## -----------------------------------------------------------------------------
build-and-scan:image:
  stage: "Scan Phase 1"
  image: docker:29
  services:
    - docker:29-dind
  needs: ["scan:build"]
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    TRIVY_VERSION: "0.72.0"
    IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .trivycache
  script:
    - echo "script start, ES_VERSION=$ES_VERSION"
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/v${TRIVY_VERSION}/contrib/install.sh | sh -s -- -b /usr/local/bin "v${TRIVY_VERSION}"
    - ls -la plugin/target/releases/
    - cp plugin/target/releases/search-guard-flx-elasticsearch-plugin-trivy.zip ci/search-guard-flx-elasticsearch-plugin-trivy.zip
    - cd ci
    - docker build -f Dockerfile.trivy -t "$IMAGE_TAG" --build-arg ES_VERSION="$ES_VERSION" .
    - trivy image --scanners vuln,secret,misconfig --offline-scan --severity $TRIVY_SEVERITY --ignore-unfixed --exit-code 1 --format table "$IMAGE_TAG"