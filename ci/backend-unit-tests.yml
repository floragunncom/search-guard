.be_unit_test:
  allow_failure: false
  stage: "Backend Unit Tests"
  tags:
    - test
  rules:
    - if: '$DOCKER_ONLY || $CI_COMMIT_MESSAGE =~ /.*SKIP-UT.*/ || $CI_COMMIT_MESSAGE =~ /.*SKIP-TESTS.*/'
      when: never    
    - when: on_success
  artifacts:
    when: always
    paths:
      # Resource/contention diagnostics written by ci/run_tests.sh, kept on both success and failure.
      - ci-diagnostics/
    reports:
      junit:
        - "*/target/surefire-reports/TEST-*.xml"
        - "*/target/failsafe-reports/TEST-*.xml"
    expire_in: 1 week
  variables:
    ES_DL_CACHE: "$CI_PROJECT_DIR/.es-download"
  cache:
    - key: "mavenrepo-$CI_COMMIT_REF_SLUG"
      paths:
        - .m2/repository
      policy: pull
    # ES tarballs are keyed by version in their filename, so a single static
    # cache is safely shared across branches and jobs.
    - key: "es-download"
      paths:
        - .es-download
      policy: pull-push

test_security:
  extends:
    - .be_unit_test
  script:
    - ci/run_tests.sh security

test_security_SslHostnameVerificationTest:
  extends:
    - .be_unit_test
  script:
    # The SslHostnameVerificationTest generated a lot of logs, causing GitLab’s log limit to be exceeded.
    # As a result, logs from other tests were also not displayed, so it was moved to a separate job.
    - ci/run_tests.sh security test-ssl-hostname-verification

test_ssl:
  extends:
    - .be_unit_test
  script:
